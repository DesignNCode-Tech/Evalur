spring.application.name=evalur
server.port=${SERVER_PORT:8081}

# 1. Database Connection
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate / JPA Configuration
spring.jpa.hibernate.ddl-auto=update  
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Industry Standard: use snake_case in DB but camelCase in Java
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

#1. JWT Configuration
evalur.jwt.secret=${JWT_SECRET}
evalur.jwt.expirationMs=${JWT_EXPIRATION_MS} 

